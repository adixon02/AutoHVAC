services:
  - type: web
    name: autohvac-backend
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: python test_minimal.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://auto-hvac.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        generateValue: true